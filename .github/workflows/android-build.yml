name: Android build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # Debug APKs are device-test artifacts. Keeping this key stable allows the
      # next GitHub build to be installed over the previous test build.
      - name: Restore stable debug signing key
        uses: actions/cache@v5
        with:
          path: ~/.android/debug.keystore
          key: appviewcamera-android-debug-keystore-v1

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :gateway:test :viewer:test --stacktrace

      - name: Run Android lint
        run: ./gradlew :gateway:lint :viewer:lint --stacktrace

      - name: Build Gateway and Viewer
        run: ./gradlew :gateway:assembleDebug :viewer:assembleDebug --stacktrace

      - name: Verify Android 10 compatibility and stable signer
        shell: bash
        run: |
          set -euo pipefail
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          aapt="$build_tools/aapt"
          apksigner="$build_tools/apksigner"
          test -x "$aapt"
          test -x "$apksigner"

          for apk in \
            gateway/build/outputs/apk/debug/gateway-debug.apk \
            viewer/build/outputs/apk/debug/viewer-debug.apk; do
            badging="$("$aapt" dump badging "$apk")"
            echo "$badging" | grep -E "^package:|^sdkVersion:|^native-code:"
            min_sdk="$(echo "$badging" | sed -n "s/^sdkVersion:'\([0-9][0-9]*\)'.*/\1/p")"
            test -n "$min_sdk"
            test "$min_sdk" -le 29
            "$apksigner" verify --verbose --print-certs "$apk"
          done

          gateway_signer="$("$apksigner" verify --print-certs gateway/build/outputs/apk/debug/gateway-debug.apk | sed -n 's/^Signer #1 certificate SHA-256 digest: //p')"
          viewer_signer="$("$apksigner" verify --print-certs viewer/build/outputs/apk/debug/viewer-debug.apk | sed -n 's/^Signer #1 certificate SHA-256 digest: //p')"
          test -n "$gateway_signer"
          test "$gateway_signer" = "$viewer_signer"
          echo "Stable APK signer SHA-256: $gateway_signer"

      - name: Save APKs for Android 10 install test
        uses: actions/upload-artifact@v7
        with:
          name: android-10-install-input
          path: |
            gateway/build/outputs/apk/debug/gateway-debug.apk
            viewer/build/outputs/apk/debug/viewer-debug.apk
          if-no-files-found: error

      - name: Upload Gateway APK
        uses: actions/upload-artifact@v7
        with:
          name: AppView-Android-Gateway
          path: gateway/build/outputs/apk/debug/gateway-debug.apk
          if-no-files-found: error

      - name: Upload Viewer APK
        uses: actions/upload-artifact@v7
        with:
          name: AppView-Viewer
          path: viewer/build/outputs/apk/debug/viewer-debug.apk
          if-no-files-found: error

      - name: Upload reports after failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-build-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  android-10-install:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v7
        with:
          name: android-10-install-input
          path: apks

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS="static_node=kvm"' \\
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install and update APKs on Android 10
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: |
            adb install apks/viewer/build/outputs/apk/debug/viewer-debug.apk
            adb install -r apks/viewer/build/outputs/apk/debug/viewer-debug.apk
            adb install apks/gateway/build/outputs/apk/debug/gateway-debug.apk
            adb install -r apks/gateway/build/outputs/apk/debug/gateway-debug.apk
            adb shell pm path com.banupham.appviewcamera.viewer
            adb shell pm path com.banupham.appviewcamera.gateway
