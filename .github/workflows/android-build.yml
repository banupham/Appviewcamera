name: Android build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # Debug APKs are device-test artifacts. Keeping this key stable allows the
      # next GitHub build to be installed over the previous test build.
      - name: Restore stable debug signing key
        uses: actions/cache@v5
        with:
          path: ~/.android/debug.keystore
          key: appviewcamera-android-debug-keystore-v1

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :gateway:test :viewer:test --stacktrace

      - name: Run Android lint
        run: ./gradlew :gateway:lint :viewer:lint --stacktrace

      - name: Build Gateway and Viewer
        run: ./gradlew :gateway:assembleDebug :viewer:assembleDebug --stacktrace

      - name: Sign APKs with v1 and v2 for Android 10 OEM compatibility
        shell: bash
        run: |
          set -euo pipefail
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          for apk in \
            gateway/build/outputs/apk/debug/gateway-debug.apk \
            viewer/build/outputs/apk/debug/viewer-debug.apk; do
            signed_apk="${apk%.apk}-signed.apk"
            jarsigner \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -keypass android \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              "$apk" \
              androiddebugkey
            "$apksigner" sign \
              --ks "$HOME/.android/debug.keystore" \
              --ks-key-alias androiddebugkey \
              --ks-pass pass:android \
              --key-pass pass:android \
              --min-sdk-version 23 \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled false \
              --out "$signed_apk" \
              "$apk"
            mv "$signed_apk" "$apk"
          done

      - name: Verify Android 10 compatibility and APK signatures
        shell: bash
        run: |
          set -euo pipefail
          aapt="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -1)"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          echo "aapt=$aapt"
          echo "apksigner=$apksigner"
          test -x "$aapt"
          test -x "$apksigner"

          declare -a signers=()
          for apk in \
            gateway/build/outputs/apk/debug/gateway-debug.apk \
            viewer/build/outputs/apk/debug/viewer-debug.apk; do
            badging="$("$aapt" dump badging "$apk")"
            echo "$badging" | grep -E "^package:|^sdkVersion:" || true
            min_sdk="$(echo "$badging" | sed -n "s/^sdkVersion:'\([0-9][0-9]*\)'.*/\1/p")"
            echo "$apk minSdk=$min_sdk"
            test -n "$min_sdk"
            test "$min_sdk" -le 29
            verification="$("$apksigner" verify --verbose "$apk")"
            echo "$verification"
            echo "$verification" | grep -F "Verified using v1 scheme (JAR signing): true"
            echo "$verification" | grep -F "Verified using v2 scheme (APK Signature Scheme v2): true"
            signer="$(keytool -printcert -jarfile "$apk" | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' | head -1)"
            echo "$apk signer=$signer"
            test -n "$signer"
            signers+=("$signer")
          done

          test "${signers[0]}" = "${signers[1]}"
          echo "Stable APK signer SHA-256: ${signers[0]}"

      - name: Save APKs for Android 10 install test
        uses: actions/upload-artifact@v7
        with:
          name: android-10-install-input
          path: |
            gateway/build/outputs/apk/debug/gateway-debug.apk
            viewer/build/outputs/apk/debug/viewer-debug.apk
          if-no-files-found: error

      - name: Upload Gateway APK
        uses: actions/upload-artifact@v7
        with:
          name: AppView-Android-Gateway
          path: gateway/build/outputs/apk/debug/gateway-debug.apk
          if-no-files-found: error

      - name: Upload Viewer APK
        uses: actions/upload-artifact@v7
        with:
          name: AppView-Viewer
          path: viewer/build/outputs/apk/debug/viewer-debug.apk
          if-no-files-found: error

      - name: Upload reports after failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-build-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  android-10-install:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v7
        with:
          name: android-10-install-input
          path: apks

      - name: Enable KVM
        run: |
          test -e /dev/kvm
          sudo chmod 666 /dev/kvm

      - name: Install and update APKs on Android 10
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: |
            adb install apks/viewer/build/outputs/apk/debug/viewer-debug.apk
            adb install -r apks/viewer/build/outputs/apk/debug/viewer-debug.apk
            adb install apks/gateway/build/outputs/apk/debug/gateway-debug.apk
            adb install -r apks/gateway/build/outputs/apk/debug/gateway-debug.apk
            adb shell pm path com.banupham.appviewcamera.viewer
            adb shell pm path com.banupham.appviewcamera.gateway
